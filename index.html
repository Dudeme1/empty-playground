<!DOCTYPE html>
<html>
  <head>
    <title>My Playground</title>
    <script>
        function sayHi() {
            let uses = parseInt(localStorage.getItem("uses") || 0);

            if (uses >= 5) {
                alert("You've used up your 5 free uses! Subscribe to continue 🔒");
                return;
            }
            let name = document.getElementById("nameInput").value;
            alert("Hi " + name + "! 👋")

            localStorage.setItem("uses", uses+1);
        }
    </script>
  </head>
  <body>
    <h1>Welcome to your playground</h1>
    <input id="nameInput" type="text" placeholder="Enter your name" />
    <button onclick="sayHi()">Say Hi</button>

  </body>
</html>
