<!DOCTYPE html>
<html>
  <head>
    <title>My Playground</title>
    <script>
        function sayHi() {
            let name = document.getElementById("nameInput").value;
            alert("Hi " + name + "! 👋")
        }
    </script>
  </head>
  <body>
    <h1>Welcome to your playground</h1>
    <input id="nameInput" type="text" placeholder="Enter your name" />
    <button onclick="sayHi()">Say Hi</button>

  </body>
</html>
